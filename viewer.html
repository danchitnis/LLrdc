<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLrdc - Low Latency Remote Desktop</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>

    <div id="top-bar">
        <div id="top-bar-left">
            <div id="brand">LLrdc</div>
            <div id="config-container">
                <button id="config-btn">⚙️ Config</button>
                <div id="config-dropdown" class="hidden">
                <div class="config-tabs">
                    <button class="config-tab-btn active" data-tab="tab-stream">Stream</button>
                    <button class="config-tab-btn" data-tab="tab-quality">Quality</button>
                    <button class="config-tab-btn" data-tab="tab-performance">Performance</button>
                    <button class="config-tab-btn" data-tab="tab-input">Input</button>
                    <button class="config-tab-btn" data-tab="tab-audio">Audio</button>
                </div>

                <!-- TAB 1: STREAM SETTINGS -->
                <div id="tab-stream" class="config-tab-content active">
                    <div class="config-group">
                        <label for="video-codec-select">Server Video Codec</label>
                        <select id="video-codec-select">
                            <option value="vp8">VP8</option>
                            <option value="h264">H.264 (CPU)</option>
                            <option value="h264_nvenc" class="codec-opt-gpu">H.264 (GPU - NVENC)</option>
                            <option value="h265">H.265 (CPU)</option>
                            <option value="h265_nvenc" class="codec-opt-gpu">H.265 (GPU - NVENC)</option>
                            <option value="av1">AV1 (CPU)</option>
                            <option value="av1_nvenc" class="codec-opt-gpu">AV1 (GPU - NVENC)</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="framerate-select">Frame Rate</label>
                        <select id="framerate-select">
                            <option value="15">15 FPS</option>
                            <option value="30" selected>30 FPS</option>
                            <option value="60">60 FPS</option>
                            <option value="90">90 FPS</option>
                            <option value="120">120 FPS</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="max-res-select">Max Resolution</label>
                        <select id="max-res-select">
                            <option value="0" selected>Responsive</option>
                            <option value="720">720p</option>
                            <option value="1080">1080p</option>
                            <option value="1440">2K</option>
                            <option value="2160">4K</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="hdpi-select">Desktop Scaling (HDPI)</label>
                        <select id="hdpi-select">
                            <option value="100">100%</option>
                            <option value="125">125%</option>
                            <option value="150">150%</option>
                            <option value="175">175%</option>
                            <option value="200" selected>200%</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label><input type="checkbox" id="client-gpu-checkbox"> Enable Client Hardware Acceleration</label>
                    </div>
                    <div class="config-group gpu-only" style="align-items: flex-start; flex-direction: column; display: none !important;">
                        <span id="direct-buffer-label">Direct Buffer</span>
                        <div id="direct-buffer-status" aria-labelledby="direct-buffer-label" title="Read-only startup status for DMA-BUF direct capture">Compat mode</div>
                    </div>
                </div>

                <!-- TAB 2: QUALITY & BANDWIDTH -->
                <div id="tab-quality" class="config-tab-content" style="display: none !important;">
                    <div class="config-group">
                        <label><input type="radio" name="target-type" value="bandwidth" checked> Target Bandwidth</label>
                        <select id="bandwidth-select" aria-label="Target Bandwidth Value">
                            <option value="1">1 Mbps</option>
                            <option value="5" selected>5 Mbps</option>
                            <option value="10">10 Mbps</option>
                            <option value="20">20 Mbps</option>
                            <option value="50">50 Mbps</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label><input type="radio" name="target-type" value="quality"> Target Quality</label>
                        <input type="range" id="quality-slider" min="10" max="100" value="70" disabled aria-label="Target Quality Value">
                        <span id="quality-value">70</span>
                    </div>
                    <div class="config-group" style="padding-top: 5px; flex-direction: column; align-items: flex-start;">
                        <label title="Allow encoder to use less bandwidth during static scenes"><input type="checkbox" id="vbr-checkbox" checked> Enable Variable Bitrate (VBR)</label>
                        <label title="Completely drop duplicate frames to save CPU and bandwidth"><input type="checkbox" id="mpdecimate-checkbox"> Enable Drop Duplicate Frames (mpdecimate)</label>
                        <label title="Achieve RDP-like sharpness by sending lossless patches for static regions"><input type="checkbox" id="hybrid-checkbox"> Enable Hybrid Sharpness (RDP-style)</label>
                        <div class="config-group" style="width: 100%; margin-top: 5px; flex-direction: row; align-items: center;">
                            <label for="settle-slider" title="How long the screen must be idle before sending lossless patches" style="white-space: nowrap;">Settle Time (ms)</label>
                            <input type="range" id="settle-slider" min="100" max="2000" step="50" value="300" style="flex: 1; margin: 0 10px;">
                            <span id="settle-value">300</span>
                        </div>
                        <div class="config-group" style="width: 100%; margin-top: 5px; flex-direction: row; align-items: center;">
                            <label for="tile-size-slider" title="Size of the lossless patches sent to the client" style="white-space: nowrap;">Patch Tile Size (px)</label>
                            <input type="range" id="tile-size-slider" min="64" max="1024" step="64" value="512" style="flex: 1; margin: 0 10px;">
                            <span id="tile-size-value">512</span>
                        </div>
                        <label title="Improve text clarity by avoiding chroma subsampling (H.264/AV1 only)"><input type="checkbox" id="chroma-checkbox"> Enable YUV 4:4:4 Chroma</label>
                    </div>
                    <div class="config-group">
                        <label for="keyframe-interval-select" title="How often a full frame is sent (WebRTC only)">Keyframe Interval</label>
                        <select id="keyframe-interval-select">
                            <option value="1">1 second</option>
                            <option value="2" selected>2 seconds</option>
                            <option value="3">3 seconds</option>
                            <option value="5">5 seconds</option>
                            <option value="10">10 seconds</option>
                        </select>
                    </div>
                </div>

                <!-- TAB 3: PERFORMANCE -->
                <div id="tab-performance" class="config-tab-content" style="display: none !important;">
                    <div class="config-group">
                        <label for="cpu-effort-slider" title="Lower is faster but lower quality (libvpx only)">CPU Effort</label>
                        <input type="range" id="cpu-effort-slider" min="0" max="8" value="6">
                        <span id="cpu-effort-value">6</span>
                    </div>
                    <div class="config-group">
                        <label for="cpu-threads-select">CPU Threads</label>
                        <select id="cpu-threads-select">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="4" selected>4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="webrtc-buffer-slider" title="Frames to buffer before dropping (Lower = less lag, higher = smoother)">WebRTC Buffer</label>
                        <input type="range" id="webrtc-buffer-slider" min="1" max="100" value="30">
                        <span id="webrtc-buffer-value">30</span>
                    </div>
                    <div class="config-group gpu-only" style="display: none !important;">
                        <label><input type="checkbox" id="nvenc-latency-checkbox" checked> Enable NVENC ULL (Ultra Low Latency)</label>
                    </div>
                    <div class="config-group">
                        <label title="Enable ultra-low latency WebRTC transport (ICE Lite, disabled replay protection). Recommended for low resolutions only."><input type="checkbox" id="webrtc-low-latency-checkbox"> Enable WebRTC Transport ULL</label>
                    </div>
                </div>

                <!-- TAB 4: INPUT -->
                <div id="tab-input" class="config-tab-content" style="display: none !important;">
                    <div class="config-group">
                        <label><input type="checkbox" id="desktop-mouse-checkbox" checked> Enable Desktop Mouse</label>
                    </div>
                    <div class="config-group">
                        <label><input type="checkbox" id="clipboard-checkbox" checked> Enable Clipboard Sync</label>
                    </div>
                    <div class="config-group">
                        <label for="activity-hz-slider" title="How often the server pings for screen damage during input">Activity Heartbeat (Hz)</label>
                        <input type="range" id="activity-hz-slider" min="1" max="120" value="30">
                        <span id="activity-hz-value">30</span>
                    </div>
                    <div class="config-group">
                        <label for="activity-timeout-slider" title="How long the heartbeat continues after last input">Inactivity Timeout (ms)</label>
                        <input type="range" id="activity-timeout-slider" min="100" max="5000" step="100" value="1500">
                        <span id="activity-timeout-value">1500</span>
                    </div>
                </div>

                <!-- TAB 5: AUDIO -->
                <div id="tab-audio" class="config-tab-content" style="display: none !important;">
                    <div class="config-group">
                        <label><input type="checkbox" id="enable-audio-checkbox" checked> Enable Audio</label>
                    </div>
                    <div class="config-group">
                        <label for="audio-bitrate-select">Audio Bitrate</label>
                        <select id="audio-bitrate-select">
                            <option value="32k">32 kbps</option>
                            <option value="64k">64 kbps</option>
                            <option value="128k" selected>128 kbps</option>
                            <option value="256k">256 kbps</option>
                            <option value="512k">512 kbps</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        </div>
        <div id="status">Connecting...</div>
    </div>

    <div id="display-container">
        <!-- Replaced video with canvas for explicit painting control -->
        <canvas id="display" width="1280" height="720"></canvas>
        <canvas id="sharpness-layer" width="1280" height="720"></canvas>
        <video id="webrtc-video" autoplay playsinline muted></video>
        <div id="input-overlay"></div>
        <!-- Hidden textarea for clipboard synchronization -->
        <textarea id="clipboard-area" style="position: absolute; left: -9999px; top: 0; width: 1px; height: 1px; opacity: 0.01;"></textarea>
    </div>

    <script type="module" src="/src/viewer.ts"></script>
</body>

</html>
